name: acco

on:
  push:
    paths:
      - req/**

permissions:
  contents: write

concurrency: acco

jobs:
  acco:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: acco
        shell: bash
        run: |
          python - <<'PY'
          import csv
          from pathlib import Path

          cols = [
              "account", "salt", "hash", "userId", "nickname", "deviceName",
              "signature", "registeredAt", "lastLoginAt", "language", "status",
              "reviewStatus", "reviewRequestedAt", "reviewApprovedAt", "reviewApprover",
          ]
          acco = Path("acco")
          rows = {}
          if acco.exists():
              with acco.open("r", encoding="utf-8", newline="") as f:
                  for i, row in enumerate(csv.reader(f)):
                      if i == 0 or not row:
                          continue
                      rows[row[0]] = (row + [""] * len(cols))[:len(cols)]

          req = Path("req")
          if req.exists():
              for file in sorted(req.iterdir()):
                  if not file.is_file():
                      continue
                  text = file.read_text(encoding="utf-8").strip()
                  if text:
                      row = next(csv.reader([text]))
                      row = (row + [""] * len(cols))[:len(cols)]
                      if row[0] and row[0] not in rows:
                          rows[row[0]] = row
                  file.unlink()

          with acco.open("w", encoding="utf-8", newline="") as f:
              out = csv.writer(f, lineterminator="\n")
              out.writerow(cols)
              for account in sorted(rows):
                  out.writerow(rows[account])
          PY
      - name: push
        shell: bash
        run: |
          if [ -n "$(git status --porcelain acco req)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add acco req
            git commit -m "acco"
            git push
          fi
