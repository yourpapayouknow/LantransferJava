name: registration-auto-approve

on:
  push:
    paths:
      - "src/main/java/com/iwmei/lantransfer/service/AuthStore.java"
      - "src/test/java/com/iwmei/lantransfer/service/AuthStoreCheck.java"
      - ".github/workflows/registration-auto-approve.yml"
  workflow_dispatch:

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - run: mvn -q test
      - run: java -cp "target/classes:target/test-classes" com.iwmei.lantransfer.service.AuthStoreCheck
